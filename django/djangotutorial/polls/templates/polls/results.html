{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results: {{ question.question_text }}</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>
<div class="polls-container">
    <h1>{{ question.question_text }}</h1>
    <ul class="results-list">
    {% for choice in question.choice_set.all %}
        <li>
            <span class="choice-text">{{ choice.choice_text }}</span>
            <span class="vote-count">{{ choice.votes }} vote{{ choice.votes|pluralize }}</span>
        </li>
    {% endfor %}
    </ul>
    <a href="{% url 'polls:detail' question.id %}" class="back-link">Vote again?</a>
    &nbsp;|&nbsp;
    <a href="{% url 'polls:index' %}" class="back-link">← Back to Polls</a>
</div>
</body>
</html>
